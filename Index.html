<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokédex Builder</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
–bg:        #0d0d0f;
–surface:   #16161a;
–surface2:  #1e1e24;
–border:    #2a2a32;
–border2:   #3a3a46;
–text:      #e8e8f0;
–muted:     #6b6b80;
–accent:    #7c6fff;
–accent2:   #a594ff;
–red:       #ff4f64;
–green:     #4fff9f;
–yellow:    #ffd44f;
–radius:    12px;
–radius-sm: 8px;
–type-normal:#9fa0a0; –type-fire:#fd7d24; –type-water:#4592c4;
–type-electric:#eed535; –type-grass:#9bcc50; –type-ice:#51c4e7;
–type-fighting:#d56723; –type-poison:#b97fc9; –type-ground:#ab9842;
–type-flying:#748fc9; –type-psychic:#f366b9; –type-bug:#729f3f;
–type-rock:#a38c21; –type-ghost:#7b62a3; –type-dragon:#53a4cf;
–type-dark:#707070; –type-steel:#9eb7b8; –type-fairy:#fdb9e9;
}

html, body { height: 100%; }
body {
font-family: ‘DM Sans’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
font-size: 15px;
line-height: 1.5;
}

/* HEADER */
.header {
position: sticky; top: 0; z-index: 100;
background: rgba(13,13,15,0.9);
backdrop-filter: blur(12px);
border-bottom: 1px solid var(–border);
padding: 0 24px;
height: 56px;
display: flex; align-items: center; justify-content: space-between;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.wordmark { font-size: 15px; font-weight: 600; letter-spacing: -.3px; color: var(–text); }
.wordmark span { color: var(–accent2); }
.mode-tabs {
display: flex; gap: 2px;
background: var(–surface2);
border-radius: 8px; padding: 3px;
}
.mode-tab {
padding: 5px 14px; border-radius: 6px; font-size: 13px;
font-family: ‘DM Sans’, sans-serif; font-weight: 500;
cursor: pointer; border: none; background: none;
color: var(–muted); transition: all .18s;
}
.mode-tab.active { background: var(–surface); color: var(–text); }
.header-right { display: flex; align-items: center; gap: 10px; }
.limit-pill {
display: flex; align-items: center; gap: 6px;
background: var(–surface2); border: 1px solid var(–border);
border-radius: 8px; padding: 5px 12px; font-size: 13px; color: var(–muted);
}
.limit-pill input {
width: 44px; background: none; border: none; color: var(–text);
font-family: ‘DM Mono’, monospace; font-size: 13px; text-align: center; font-weight: 500;
}
.limit-pill input:focus { outline: none; color: var(–accent2); }
.btn-export {
padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
font-family: ‘DM Sans’, sans-serif; cursor: pointer; border: none;
background: var(–accent); color: #fff; transition: opacity .15s;
}
.btn-export:hover { opacity: .85; }

/* LAYOUT */
.layout {
display: grid;
grid-template-columns: 300px 1fr;
height: calc(100vh - 56px);
}

/* SIDEBAR */
.sidebar {
border-right: 1px solid var(–border);
display: flex; flex-direction: column;
overflow: hidden;
background: var(–surface);
}
.sidebar-search { padding: 14px 16px; border-bottom: 1px solid var(–border); }
.search-box {
width: 100%; background: var(–surface2);
border: 1px solid var(–border); border-radius: var(–radius-sm);
color: var(–text); font-family: ‘DM Sans’, sans-serif; font-size: 14px;
padding: 8px 12px; transition: border-color .15s;
}
.search-box:focus { outline: none; border-color: var(–accent); }
.search-box::placeholder { color: var(–muted); }
.poke-list { flex: 1; overflow-y: auto; }
.poke-list::-webkit-scrollbar { width: 4px; }
.poke-list::-webkit-scrollbar-thumb { background: var(–border2); border-radius: 4px; }
.poke-row {
display: flex; align-items: center; gap: 10px;
padding: 7px 16px; cursor: pointer; transition: background .12s; user-select: none;
}
.poke-row:hover { background: var(–surface2); }
.poke-row.in-dex { opacity: .4; }
.poke-row img { width: 32px; height: 32px; image-rendering: pixelated; flex-shrink: 0; }
.poke-row .pnum { font-family: ‘DM Mono’, monospace; font-size: 11px; color: var(–muted); min-width: 28px; }
.poke-row .pname { font-size: 14px; flex: 1; }
.poke-row .check { color: var(–accent2); font-size: 12px; }
.sidebar-footer {
padding: 12px 16px; border-top: 1px solid var(–border);
display: flex; flex-direction: column; gap: 8px;
}
.btn-add {
width: 100%; padding: 10px; border-radius: var(–radius-sm);
font-family: ‘DM Sans’, sans-serif; font-size: 14px; font-weight: 500;
cursor: pointer; border: none; background: var(–accent); color: #fff; transition: opacity .15s;
}
.btn-add:hover { opacity: .85; }
.btn-clear {
width: 100%; padding: 8px; border-radius: var(–radius-sm);
font-family: ‘DM Sans’, sans-serif; font-size: 13px; font-weight: 500;
cursor: pointer; border: 1px solid var(–border2);
background: none; color: var(–muted); transition: color .15s, border-color .15s;
}
.btn-clear:hover { color: var(–red); border-color: var(–red); }

/* MAIN */
.main { display: flex; flex-direction: column; overflow: hidden; }

/* WIZARD PANEL */
.wizard-panel {
padding: 16px 20px;
border-bottom: 1px solid var(–border);
background: var(–surface);
flex-shrink: 0;
}
.wizard-label {
font-size: 11px; font-weight: 500; letter-spacing: .06em;
text-transform: uppercase; color: var(–muted); margin-bottom: 10px;
}
.wizard-steps { display: flex; flex-wrap: wrap; gap: 6px; }
.wizard-step {
display: flex; align-items: center; gap: 8px;
background: var(–surface2); border: 1px solid var(–border);
border-radius: var(–radius-sm); padding: 7px 10px;
cursor: pointer; transition: border-color .15s, background .15s;
min-width: 148px; flex: 1;
}
.wizard-step:hover { border-color: var(–border2); background: var(–bg); }
.wizard-step.done { border-color: rgba(124,111,255,.5); }
.wizard-step.active { border-color: var(–accent2); background: rgba(124,111,255,.08); }
.step-icon { font-size: 18px; flex-shrink: 0; }
.step-text { flex: 1; min-width: 0; }
.step-title { font-size: 11px; font-weight: 500; color: var(–muted); }
.step-value { font-size: 13px; color: var(–text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.step-value.empty { color: var(–muted); font-style: italic; }
.step-done-mark { color: var(–accent2); font-size: 13px; flex-shrink: 0; }

/* WIZARD MODAL */
.wizard-modal-bg {
position: fixed; inset: 0; z-index: 500;
background: rgba(0,0,0,.72); backdrop-filter: blur(4px);
display: flex; align-items: center; justify-content: center;
opacity: 0; pointer-events: none; transition: opacity .2s;
}
.wizard-modal-bg.open { opacity: 1; pointer-events: all; }
.wizard-modal {
background: var(–surface); border: 1px solid var(–border2);
border-radius: 16px; padding: 24px; width: 460px; max-width: 95vw;
transform: translateY(10px); transition: transform .2s;
max-height: 82vh; display: flex; flex-direction: column; gap: 0;
}
.wizard-modal-bg.open .wizard-modal { transform: translateY(0); }
.modal-title { font-size: 19px; font-weight: 600; margin-bottom: 3px; }
.modal-sub { font-size: 13px; color: var(–muted); margin-bottom: 14px; line-height: 1.5; }
.modal-search {
width: 100%; background: var(–surface2);
border: 1px solid var(–border); border-radius: var(–radius-sm);
color: var(–text); font-family: ‘DM Sans’, sans-serif; font-size: 14px;
padding: 9px 12px; margin-bottom: 10px; transition: border-color .15s; flex-shrink: 0;
}
.modal-search:focus { outline: none; border-color: var(–accent); }
.modal-search::placeholder { color: var(–muted); }
.modal-list { overflow-y: auto; flex: 1; margin: 0 -4px; padding: 0 4px; }
.modal-list::-webkit-scrollbar { width: 4px; }
.modal-list::-webkit-scrollbar-thumb { background: var(–border2); border-radius: 4px; }
.modal-row {
display: flex; align-items: center; gap: 10px;
padding: 7px 8px; border-radius: var(–radius-sm);
cursor: pointer; transition: background .12s;
}
.modal-row:hover { background: var(–surface2); }
.modal-row img { width: 40px; height: 40px; image-rendering: pixelated; flex-shrink: 0; }
.modal-row .pnum { font-family: ‘DM Mono’, monospace; font-size: 11px; color: var(–muted); min-width: 32px; }
.modal-row .pname { font-size: 15px; flex: 1; }
.modal-row .types { display: flex; gap: 4px; flex-shrink: 0; }
.type-chip {
font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px;
color: #fff; text-transform: uppercase; letter-spacing: .04em;
}
.modal-skip {
margin-top: 10px; width: 100%; padding: 9px; border-radius: var(–radius-sm);
font-family: ‘DM Sans’, sans-serif; font-size: 13px; font-weight: 500;
cursor: pointer; border: 1px solid var(–border2); background: none; color: var(–muted);
flex-shrink: 0; transition: color .15s;
}
.modal-skip:hover { color: var(–text); }

/* DEX SCROLL */
.dex-scroll { flex: 1; overflow-y: auto; padding: 18px 18px 60px; }
.dex-scroll::-webkit-scrollbar { width: 4px; }
.dex-scroll::-webkit-scrollbar-thumb { background: var(–border); border-radius: 4px; }
.dex-header {
display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
}
.dex-counter { font-family: ‘DM Mono’, monospace; font-size: 13px; color: var(–muted); }
.dex-counter strong { color: var(–text); font-weight: 500; }

/* DEX GRID */
.dex-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
gap: 8px;
}
.dex-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 10px 6px 8px;
display: flex; flex-direction: column; align-items: center;
position: relative; cursor: grab; user-select: none;
transition: border-color .15s, transform .12s;
animation: popin .28s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes popin { from { opacity:0; transform:scale(.65); } to { opacity:1; transform:scale(1); } }
.dex-card:hover { border-color: var(–border2); }
.dex-card.dragging { opacity: .25; cursor: grabbing; }
.dex-card.drag-over { border-color: var(–accent); transform: scale(1.05); }
.dex-card .card-num {
font-family: ‘DM Mono’, monospace; font-size: 9px; color: var(–muted);
margin-bottom: 2px; align-self: flex-start; padding-left: 2px;
}
.dex-card img { width: 62px; height: 62px; image-rendering: pixelated; }
.dex-card .card-name {
font-size: 11px; font-weight: 500; text-align: center;
color: var(–text); margin-top: 4px; line-height: 1.2;
}
.dex-card .remove-x {
position: absolute; top: 4px; right: 6px;
background: none; border: none; color: var(–muted);
font-size: 13px; cursor: pointer; line-height: 1; padding: 0;
transition: color .12s;
}
.dex-card .remove-x:hover { color: var(–red); }
.empty-card {
border: 1px dashed var(–border);
border-radius: var(–radius); min-height: 108px;
display: flex; align-items: center; justify-content: center;
color: var(–border2); font-size: 20px;
}

/* TYPE BAR */
.type-bar { margin-top: 20px; }
.type-bar-title {
font-size: 11px; font-weight: 500; text-transform: uppercase;
letter-spacing: .06em; color: var(–muted); margin-bottom: 10px;
}
.type-row { display: flex; flex-wrap: wrap; gap: 5px; }
.type-pill {
display: flex; align-items: center; gap: 5px;
padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
color: rgba(255,255,255,.92); text-transform: uppercase; letter-spacing: .03em;
transition: transform .12s; cursor: default;
}
.type-pill:hover { transform: scale(1.06); }
.type-pill.zero { opacity: .18; }
.type-pill .tcount {
background: rgba(0,0,0,.28); border-radius: 3px;
padding: 0 5px; font-size: 11px;
}

/* EMPTY STATE */
.empty-state {
grid-column: 1 / -1; display: flex; flex-direction: column;
align-items: center; justify-content: center;
gap: 12px; min-height: 260px; color: var(–muted); text-align: center; padding: 40px;
}
.empty-state .big { font-size: 44px; }
.empty-state p { font-size: 14px; max-width: 260px; line-height: 1.6; }

/* TOAST */
.toast {
position: fixed; bottom: 20px; left: 50%;
transform: translateX(-50%) translateY(14px);
background: var(–surface2); border: 1px solid var(–border2);
color: var(–text); padding: 10px 20px; border-radius: 10px;
font-size: 14px; font-weight: 500; opacity: 0;
transition: all .25s; z-index: 9999; white-space: nowrap;
box-shadow: 0 8px 32px rgba(0,0,0,.4);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* MOBILE */
@media (max-width: 700px) {
.layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; height: auto; min-height: calc(100vh - 56px); }
.sidebar { border-right: none; border-bottom: 1px solid var(–border); max-height: 42vh; }
.dex-grid { grid-template-columns: repeat(auto-fill, minmax(76px, 1fr)); }
.header { padding: 0 14px; gap: 8px; }
.limit-pill { display: none; }
}
@media (orientation: landscape) and (max-height: 480px) {
.layout { grid-template-columns: 230px 1fr; height: calc(100vh - 48px); }
.wizard-panel { padding: 10px 14px; }
.wizard-step { min-width: 120px; padding: 5px 8px; }
}
</style>

</head>

<script>
const WIZARD_STEPS = [
  { id:'grass-starter',   icon:'🌿', title:'Grass starter',       hint:'The grass-type starter for your region',                       types:['grass'] },
  { id:'fire-starter',    icon:'🔥', title:'Fire starter',        hint:'The fire-type starter Pokémon',                                types:['fire'] },
  { id:'water-starter',   icon:'💧', title:'Water starter',       hint:'The water-type starter Pokémon',                               types:['water'] },
  { id:'early-bird',      icon:'🐦', title:'Early route bird',    hint:'The early flying-type (Pidgey, Starly, Taillow…)',             types:['flying','normal'] },
  { id:'early-bug',       icon:'🐛', title:'Early route bug',     hint:'The early bug-type (Caterpie, Weedle, Wurmple…)',              types:['bug'] },
  { id:'early-rodent',    icon:'🐭', title:'Route 1 rodent',      hint:'The small early normal-type rodent (Rattata, Zigzagoon…)',     types:['normal'] },
  { id:'fossil',          icon:'🦕', title:'Fossil Pokémon',      hint:'A revived fossil Pokémon (usually Rock-type)',                 types:['rock'] },
  { id:'ghost',           icon:'👻', title:'Ghost-type',          hint:'Your region\'s ghost-type representative',                     types:['ghost'] },
  { id:'electric',        icon:'⚡', title:'Electric-type',       hint:'The electric-type of the region (Pikachu, Electabuzz…)',       types:['electric'] },
  { id:'ice',             icon:'🧊', title:'Ice-type',            hint:'Your region\'s ice-type Pokémon',                              types:['ice'] },
  { id:'pseudo',          icon:'🐉', title:'Pseudo-legendary',    hint:'The 600-BST powerhouse at the end (Dragonite, Tyranitar…)',   types:['dragon'] },
  { id:'version-leg-1',   icon:'✨', title:'Version legendary 1', hint:'First version\'s box legendary',                              types:[] },
  { id:'version-leg-2',   icon:'🌟', title:'Version legendary 2', hint:'Second version\'s box legendary',                             types:[] },
  { id:'mythical',        icon:'🌈', title:'Mythical',            hint:'The event / mythical Pokémon for your region',                types:[] },
];

const TYPES = ['normal','fire','water','electric','grass','ice','fighting','poison',
               'ground','flying','psychic','bug','rock','ghost','dragon','dark','steel','fairy'];
const API = 'https://pokeapi.co/api/v2/';
const SPRITE = id => `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;

let allPokemon = [], dex = [], dexLimit = 151;
let selectedId = null, wizardMode = true;
let wizardAnswers = {}, activeStepId = null;
let dragSrcIdx = null, evoChains = {};

// INIT
async function init() {
  try {
    const res = await fetch(`${API}pokemon?limit=1025&offset=0`);
    const data = await res.json();
    allPokemon = data.results.map((p, i) => ({
      id: i+1, name: p.name, types: [], spriteUrl: SPRITE(i+1), loaded: false, url: p.url
    }));
    batchTypes(0, Math.min(300, allPokemon.length));
  } catch(e) {
    showToast('Failed to load Pokémon data — check connection');
  }
  renderWizardSteps();
  renderDexGrid();
  renderTypeChart();
}

async function batchTypes(start, end) {
  await Promise.allSettled(allPokemon.slice(start, end).map(loadTypes));
  renderPokeList();
}

async function loadTypes(p) {
  if (p.loaded) return;
  try {
    const d = await (await fetch(p.url)).json();
    p.types = d.types.map(t => t.type.name);
    p.loaded = true;
  } catch(e) {}
}

// EVO CHAIN
async function getChain(id) {
  if (evoChains[id]) return evoChains[id];
  try {
    const spec = await (await fetch(`${API}pokemon-species/${id}`)).json();
    const cd   = await (await fetch(spec.evolution_chain.url)).json();
    const ids = [];
    const walk = n => {
      const m = n?.species?.url?.match(/\/(\d+)\/$/);
      if (m) ids.push(+m[1]);
      (n.evolves_to||[]).forEach(walk);
    };
    walk(cd.chain);
    ids.forEach(i => { evoChains[i] = ids; });
    return ids;
  } catch(e) { evoChains[id] = [id]; return [id]; }
}

// WIZARD STEPS
function renderWizardSteps() {
  const container = document.getElementById('wizardSteps');
  container.innerHTML = WIZARD_STEPS.map(step => {
    const pid = wizardAnswers[step.id];
    const p   = pid ? allPokemon.find(x => x.id === pid) : null;
    const done = !!p, active = activeStepId === step.id;
    return `<div class="wizard-step ${done?'done':''} ${active?'active':''}" data-step="${step.id}">
      <div class="step-icon">${step.icon}</div>
      <div class="step-text">
        <div class="step-title">${step.title}</div>
        ${done
          ? `<div class="step-value">${cap(p.name)}</div>`
          : `<div class="step-value empty">tap to pick…</div>`}
      </div>
      ${done ? '<div class="step-done-mark">✓</div>' : ''}
    </div>`;
  }).join('');
  container.querySelectorAll('.wizard-step').forEach(el =>
    el.addEventListener('click', () => openModal(el.dataset.step))
  );
}

function openModal(stepId) {
  activeStepId = stepId;
  const step = WIZARD_STEPS.find(s => s.id === stepId);
  document.getElementById('modalTitle').textContent = step.title;
  document.getElementById('modalSub').textContent   = step.hint;
  document.getElementById('modalSearch').value      = '';
  renderModalList('');
  document.getElementById('wizardModalBg').classList.add('open');
  document.getElementById('modalSearch').focus();
  renderWizardSteps();
}

function closeModal() {
  document.getElementById('wizardModalBg').classList.remove('open');
  activeStepId = null;
  renderWizardSteps();
}

function renderModalList(q) {
  const step = WIZARD_STEPS.find(s => s.id === activeStepId);
  if (!step) return;
  const pool = allPokemon.slice(0, dexLimit);
  let results;
  if (q.trim()) {
    results = pool.filter(p => p.name.includes(q.toLowerCase()) || String(p.id).includes(q));
  } else if (step.types.length) {
    const hinted = pool.filter(p => p.types.some(t => step.types.includes(t)));
    const rest   = pool.filter(p => !p.types.some(t => step.types.includes(t)));
    results = [...hinted, ...rest];
  } else {
    results = pool;
  }
  const list = document.getElementById('modalList');
  list.innerHTML = results.slice(0, 100).map(p => {
    const chips = p.types.map(t =>
      `<span class="type-chip" style="background:var(--type-${t})">${t}</span>`
    ).join('');
    return `<div class="modal-row" data-id="${p.id}">
      <img src="${p.spriteUrl}" alt="${p.name}" loading="lazy">
      <span class="pnum">#${p.id}</span>
      <span class="pname">${cap(p.name)}</span>
      <span class="types">${chips}</span>
    </div>`;
  }).join('');
  list.querySelectorAll('.modal-row').forEach(el =>
    el.addEventListener('click', () => pickWizard(+el.dataset.id))
  );
}

async function pickWizard(id) {
  wizardAnswers[activeStepId] = id;
  closeModal();
  await addToDexter([id]);
}

// ADD TO DEX
async function addToDexter(ids) {
  let added = [];
  for (const id of ids) {
    const p = allPokemon.find(x => x.id === id);
    if (!p) continue;
    if (!p.loaded) await loadTypes(p);
    const chainIds = await getChain(id);
    const inDex = new Set(dex.map(x => x.id));
    const toAdd = chainIds.filter(i => i <= dexLimit && !inDex.has(i)).sort((a,b)=>a-b);
    for (const cid of toAdd) {
      const m = allPokemon.find(x => x.id === cid);
      if (m) { if (!m.loaded) await loadTypes(m); dex.push(m); added.push(m); }
    }
  }
  if (added.length) {
    const names = added.map(p => cap(p.name)).join(', ');
    showToast(`Added ${names}`);
  } else {
    showToast('Already in dex!');
  }
  renderWizardSteps();
  renderDexGrid();
  renderTypeChart();
  renderPokeList();
  setTimeout(() => {
    const s = document.getElementById('dexScroll');
    s.scrollTo({ top: s.scrollHeight, behavior: 'smooth' });
  }, 80);
}

// MANUAL MODE
function setMode(wizard) {
  wizardMode = wizard;
  document.getElementById('tabWizard').classList.toggle('active', wizard);
  document.getElementById('tabManual').classList.toggle('active', !wizard);
  document.getElementById('sidebar').style.display = wizard ? 'none' : 'flex';
  document.getElementById('wizardPanel').style.display = wizard ? '' : 'none';
  if (!wizard) renderPokeList();
}

function renderPokeList() {
  if (wizardMode) return;
  const q = document.getElementById('searchBox').value.toLowerCase().trim();
  const pool = allPokemon.slice(0, dexLimit);
  const inDex = new Set(dex.map(x => x.id));
  const filtered = q ? pool.filter(p => p.name.includes(q) || String(p.id).includes(q)) : pool;
  document.getElementById('pokeList').innerHTML = filtered.slice(0, 120).map(p =>
    `<div class="poke-row ${inDex.has(p.id)?'in-dex':''}" data-id="${p.id}">
      <img src="${p.spriteUrl}" alt="" loading="lazy">
      <span class="pnum">#${p.id}</span>
      <span class="pname">${cap(p.name)}</span>
      ${inDex.has(p.id) ? '<span class="check">✓</span>' : ''}
    </div>`
  ).join('');
  document.getElementById('pokeList').querySelectorAll('.poke-row').forEach(el => {
    el.addEventListener('click', () => { selectedId = +el.dataset.id; renderPokeList(); });
    el.addEventListener('dblclick', () => { selectedId = +el.dataset.id; addManual(); });
  });
}

async function addManual() {
  if (!selectedId) { showToast('Select a Pokémon first'); return; }
  if (dex.length >= dexLimit) { showToast(`Limit reached (${dexLimit})`); return; }
  await addToDexter([selectedId]);
}

// DEX GRID
function renderDexGrid() {
  document.getElementById('dexCount').textContent     = dex.length;
  document.getElementById('dexLimitLabel').textContent = dexLimit;
  const grid = document.getElementById('dexGrid');
  grid.innerHTML = '';

  if (!dex.length) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.innerHTML = `<div class="big">🌐</div>
      <p>Tap a slot above to start building your regional Pokédex.</p>`;
    grid.appendChild(empty);
    return;
  }

  dex.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'dex-card';
    card.draggable = true;
    card.dataset.idx = i;
    card.innerHTML = `<div class="card-num">${String(i+1).padStart(3,'0')}</div>
      <img src="${p.spriteUrl}" alt="${p.name}" loading="lazy">
      <div class="card-name">${cap(p.name)}</div>
      <button class="remove-x" data-idx="${i}">✕</button>`;
    card.addEventListener('dragstart', e => { dragSrcIdx=i; card.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; });
    card.addEventListener('dragover',  e => { e.preventDefault(); clearDrag(); card.classList.add('drag-over'); });
    card.addEventListener('drop',      e => { e.preventDefault(); doSwap(i); });
    card.addEventListener('dragend',   () => { dragSrcIdx=null; clearDrag(); card.classList.remove('dragging'); });
    addTouchDrag(card, i);
    card.querySelector('.remove-x').addEventListener('click', e => {
      e.stopPropagation();
      dex.splice(+e.currentTarget.dataset.idx, 1);
      renderDexGrid(); renderTypeChart(); renderPokeList(); renderWizardSteps();
    });
    grid.appendChild(card);
  });

  const empties = Math.min(16, dexLimit - dex.length);
  for (let i = 0; i < empties; i++) {
    const el = document.createElement('div'); el.className = 'empty-card'; el.textContent = '?';
    grid.appendChild(el);
  }
}

function clearDrag() { document.querySelectorAll('.dex-card').forEach(c => c.classList.remove('drag-over')); }

function doSwap(ti) {
  if (dragSrcIdx === null || dragSrcIdx === ti) return;
  const m = dex.splice(dragSrcIdx, 1)[0]; dex.splice(ti, 0, m);
  renderDexGrid(); renderTypeChart();
}

function addTouchDrag(el, idx) {
  let src = null;
  el.addEventListener('touchstart', () => { src=idx; el.style.opacity='.35'; }, {passive:true});
  el.addEventListener('touchend', e => {
    el.style.opacity='';
    const t=e.changedTouches[0];
    const target=document.elementFromPoint(t.clientX,t.clientY)?.closest('.dex-card');
    if (target&&src!==null) { const ti=+target.dataset.idx; if(src!==ti){const m=dex.splice(src,1)[0];dex.splice(ti,0,m);renderDexGrid();renderTypeChart();} }
    src=null;
  }, {passive:true});
}

// TYPE CHART
function renderTypeChart() {
  const counts = Object.fromEntries(TYPES.map(t=>[t,0]));
  dex.forEach(p => (p.types||[]).forEach(t => { if(counts[t]!==undefined) counts[t]++; }));
  document.getElementById('typeRow').innerHTML = TYPES.map(t =>
    `<div class="type-pill ${counts[t]===0?'zero':''}" style="background:var(--type-${t})">
      ${cap(t)}<span class="tcount">${counts[t]}</span></div>`
  ).join('');
}

// EXPORT
document.getElementById('exportBtn').addEventListener('click', () => {
  if (!dex.length) { showToast('Your dex is empty!'); return; }
  const text = dex.map((p,i) => `${String(i+1).padStart(3,'0')}. ${cap(p.name)} (#${p.id})`).join('\n');
  navigator.clipboard.writeText(text)
    .then(()=>showToast(`Copied ${dex.length} Pokémon ✓`))
    .catch(()=>{const ta=document.createElement('textarea');ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showToast(`Copied ${dex.length} Pokémon ✓`);});
});

// TOAST
let _tt;
function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg;
  t.classList.add('show'); clearTimeout(_tt);
  _tt=setTimeout(()=>t.classList.remove('show'), 2400);
}

function cap(s){ return s?s[0].toUpperCase()+s.slice(1):''; }

// EVENTS
document.getElementById('tabWizard').addEventListener('click', ()=>setMode(true));
document.getElementById('tabManual').addEventListener('click', ()=>setMode(false));
document.getElementById('searchBox').addEventListener('input', renderPokeList);
document.getElementById('addBtn').addEventListener('click', addManual);
document.getElementById('clearBtn').addEventListener('click', ()=>{
  dex=[]; wizardAnswers={};
  renderWizardSteps(); renderDexGrid(); renderTypeChart(); renderPokeList(); showToast('Cleared');
});
document.getElementById('limitInput').addEventListener('change', e => {
  const v=+e.target.value; if(!v||v<1){e.target.value=dexLimit;return;}
  dexLimit=Math.min(v,1025); e.target.value=dexLimit;
  dex=dex.filter(p=>p.id<=dexLimit);
  if(dexLimit>allPokemon.length) batchTypes(allPokemon.length, dexLimit);
  renderDexGrid(); renderTypeChart(); renderPokeList(); showToast(`Limit → ${dexLimit}`);
});
document.getElementById('modalSearch').addEventListener('input', e=>renderModalList(e.target.value));
document.getElementById('modalSkip').addEventListener('click', closeModal);
document.getElementById('wizardModalBg').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeModal(); });

init();
</script>

</body>
