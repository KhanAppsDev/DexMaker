<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokédex Forge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {
  --bg: #0f1119;
  --bg2: #181b27;
  --bg3: #1e2233;
  --surface: #252a3a;
  --border: #2e3450;
  --text: #e8eaf0;
  --text2: #9ca3bf;
  --accent: #e8453c;
  --accent2: #ff6b63;
  --accent-glow: rgba(232,69,60,0.25);
  --success: #34d399;
  --warn: #fbbf24;
  --radius: 8px;
  --font-display: 'Chakra Petch', sans-serif;
  --font-body: 'Outfit', sans-serif;

/* Pokemon type colors */
–type-normal: #a8a878; –type-fire: #f08030; –type-water: #6890f0;
–type-electric: #f8d030; –type-grass: #78c850; –type-ice: #98d8d8;
–type-fighting: #c03028; –type-poison: #a040a0; –type-ground: #e0c068;
–type-flying: #a890f0; –type-psychic: #f85888; –type-bug: #a8b820;
–type-rock: #b8a038; –type-ghost: #705898; –type-dragon: #7038f8;
–type-dark: #705848; –type-steel: #b8b8d0; –type-fairy: #ee99ac;
}
html,body{height:100%;overflow:hidden}
body{
font-family:var(–font-body);
background:var(–bg);
color:var(–text);
display:flex;
flex-direction:column;
}

/* ── HEADER ── */
header {
background: var(–bg2);
border-bottom: 1px solid var(–border);
padding: 12px 24px;
display: flex;
align-items: center;
gap: 16px;
flex-shrink: 0;
z-index: 100;
}
header h1 {
font-family: var(–font-display);
font-size: 1.4rem;
font-weight: 700;
letter-spacing: 2px;
text-transform: uppercase;
background: linear-gradient(135deg, var(–accent), #ff9472);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
white-space: nowrap;
}
.header-controls {
display: flex;
align-items: center;
gap: 12px;
margin-left: auto;
flex-wrap: wrap;
}
.header-controls label {
font-size: 0.8rem;
color: var(–text2);
display: flex;
align-items: center;
gap: 6px;
white-space: nowrap;
}
.header-controls input[type=“number”] {
width: 60px;
background: var(–bg3);
border: 1px solid var(–border);
color: var(–text);
padding: 4px 8px;
border-radius: var(–radius);
font-family: var(–font-body);
font-size: 0.85rem;
text-align: center;
}
.header-controls input[type=“number”]:focus {
outline: none;
border-color: var(–accent);
box-shadow: 0 0 0 2px var(–accent-glow);
}
.btn {
font-family: var(–font-display);
font-size: 0.8rem;
font-weight: 600;
letter-spacing: 1px;
text-transform: uppercase;
padding: 8px 16px;
border: none;
border-radius: var(–radius);
cursor: pointer;
transition: all 0.15s;
white-space: nowrap;
}
.btn-primary {
background: var(–accent);
color: #fff;
}
.btn-primary:hover { background: var(–accent2); transform: translateY(-1px); }
.btn-secondary {
background: var(–surface);
color: var(–text);
border: 1px solid var(–border);
}
.btn-secondary:hover { background: var(–bg3); border-color: var(–accent); }
.btn-danger {
background: transparent;
color: var(–accent);
border: 1px solid var(–accent);
}
.btn-danger:hover { background: var(–accent); color: #fff; }

/* ── MAIN LAYOUT ── */
.main-wrap {
display: flex;
flex: 1;
overflow: hidden;
}

/* ── LEFT PANEL: Selector ── */
.panel-left {
width: 320px;
min-width: 260px;
background: var(–bg2);
border-right: 1px solid var(–border);
display: flex;
flex-direction: column;
flex-shrink: 0;
overflow: hidden;
}
.search-area {
padding: 16px;
border-bottom: 1px solid var(–border);
}
.search-area input {
width: 100%;
padding: 10px 14px;
background: var(–bg);
border: 1px solid var(–border);
border-radius: var(–radius);
color: var(–text);
font-family: var(–font-body);
font-size: 0.9rem;
}
.search-area input:focus {
outline: none;
border-color: var(–accent);
box-shadow: 0 0 0 2px var(–accent-glow);
}
.search-area input::placeholder { color: var(–text2); }
.pokemon-list {
flex: 1;
overflow-y: auto;
padding: 8px;
}
.pokemon-list::-webkit-scrollbar { width: 6px; }
.pokemon-list::-webkit-scrollbar-track { background: transparent; }
.pokemon-list::-webkit-scrollbar-thumb { background: var(–border); border-radius: 3px; }

.poke-option {
display: flex;
align-items: center;
gap: 10px;
padding: 8px 12px;
border-radius: var(–radius);
cursor: pointer;
transition: background 0.12s;
user-select: none;
min-height: 44px;
}
.poke-option:hover { background: var(–surface); }
.poke-option.selected { background: var(–bg3); border: 1px solid var(–accent); }
.poke-option .poke-id {
font-family: var(–font-display);
font-size: 0.75rem;
color: var(–text2);
min-width: 36px;
}
.poke-option .poke-name {
font-size: 0.9rem;
font-weight: 500;
text-transform: capitalize;
flex: 1;
}
.poke-option .poke-types {
display: flex;
gap: 4px;
}
.type-dot {
width: 10px; height: 10px;
border-radius: 50%;
flex-shrink: 0;
}
.poke-option .poke-add-icon {
font-size: 1.1rem;
color: var(–success);
opacity: 0;
transition: opacity 0.12s;
}
.poke-option:hover .poke-add-icon { opacity: 1; }
.poke-option.in-dex .poke-name { color: var(–text2); text-decoration: line-through; }
.poke-option.in-dex .poke-add-icon { display: none; }
.evo-tag {
font-size: 0.6rem;
background: var(–accent);
color: #fff;
padding: 1px 5px;
border-radius: 3px;
font-weight: 600;
letter-spacing: 0.5px;
text-transform: uppercase;
}

/* ── RIGHT PANEL: Dex Grid ── */
.panel-right {
flex: 1;
display: flex;
flex-direction: column;
overflow: hidden;
}

/* Type Bar */
.type-bar {
display: flex;
flex-wrap: wrap;
gap: 6px;
padding: 12px 20px;
background: var(–bg2);
border-bottom: 1px solid var(–border);
flex-shrink: 0;
}
.type-chip {
display: flex;
align-items: center;
gap: 5px;
padding: 4px 10px;
border-radius: 20px;
font-size: 0.7rem;
font-weight: 600;
text-transform: uppercase;
letter-spacing: 0.5px;
font-family: var(–font-display);
background: var(–surface);
border: 1px solid var(–border);
color: var(–text2);
transition: all 0.2s;
}
.type-chip .type-count {
background: var(–bg);
padding: 1px 6px;
border-radius: 10px;
font-size: 0.65rem;
}
.type-chip.active {
border-color: currentColor;
color: var(–text);
}

/* Status bar */
.status-bar {
display: flex;
align-items: center;
gap: 12px;
padding: 8px 20px;
background: var(–bg2);
border-bottom: 1px solid var(–border);
flex-shrink: 0;
font-size: 0.8rem;
}
.slot-counter {
font-family: var(–font-display);
font-weight: 700;
font-size: 1rem;
}
.slot-counter .filled { color: var(–accent); }
.slot-counter .total { color: var(–text2); }
.progress-track {
flex: 1;
height: 4px;
background: var(–bg);
border-radius: 2px;
overflow: hidden;
max-width: 300px;
}
.progress-fill {
height: 100%;
background: linear-gradient(90deg, var(–accent), #ff9472);
border-radius: 2px;
transition: width 0.3s ease;
}

/* Grid */
.dex-grid-wrap {
flex: 1;
overflow-y: auto;
padding: 20px;
}
.dex-grid-wrap::-webkit-scrollbar { width: 6px; }
.dex-grid-wrap::-webkit-scrollbar-track { background: transparent; }
.dex-grid-wrap::-webkit-scrollbar-thumb { background: var(–border); border-radius: 3px; }

.dex-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
gap: 8px;
max-width: 1200px;
}
.dex-slot {
aspect-ratio: 1;
border: 1px dashed var(–border);
border-radius: var(–radius);
display: flex;
align-items: center;
justify-content: center;
position: relative;
background: var(–bg2);
transition: all 0.15s;
}
.dex-slot.empty .slot-num {
font-family: var(–font-display);
font-size: 0.75rem;
color: var(–border);
}
.dex-slot.filled {
border-style: solid;
border-color: var(–border);
cursor: grab;
background: var(–bg3);
}
.dex-slot.filled:hover {
border-color: var(–accent);
box-shadow: 0 0 12px var(–accent-glow);
z-index: 2;
}
.dex-slot.filled img {
width: 70%;
height: 70%;
object-fit: contain;
image-rendering: pixelated;
pointer-events: none;
}
.dex-slot .slot-label {
position: absolute;
bottom: 2px;
left: 0;
right: 0;
text-align: center;
font-size: 0.55rem;
font-weight: 600;
text-transform: capitalize;
color: var(–text2);
overflow: hidden;
white-space: nowrap;
text-overflow: ellipsis;
padding: 0 2px;
}
.dex-slot .slot-id {
position: absolute;
top: 2px;
left: 4px;
font-family: var(–font-display);
font-size: 0.55rem;
color: var(–text2);
opacity: 0.6;
}
.dex-slot .remove-btn {
position: absolute;
top: -6px;
right: -6px;
width: 18px; height: 18px;
background: var(–accent);
color: #fff;
border: 2px solid var(–bg);
border-radius: 50%;
font-size: 0.6rem;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
opacity: 0;
transition: opacity 0.12s;
z-index: 3;
line-height: 1;
}
.dex-slot.filled:hover .remove-btn { opacity: 1; }

/* Drag states */
.dex-slot.drag-over {
border-color: var(–success) !important;
background: rgba(52,211,153,0.08);
}
.dex-slot.dragging { opacity: 0.4; }

/* Empty state */
.empty-state {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
height: 100%;
color: var(–text2);
text-align: center;
padding: 40px;
}
.empty-state svg {
width: 64px; height: 64px;
margin-bottom: 16px;
opacity: 0.3;
}
.empty-state h3 {
font-family: var(–font-display);
font-size: 1.1rem;
margin-bottom: 8px;
color: var(–text);
}
.empty-state p { font-size: 0.85rem; }

/* Loading */
.loading-overlay {
position: fixed;
inset: 0;
background: var(–bg);
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
z-index: 1000;
transition: opacity 0.4s;
}
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.pokeball-spinner {
width: 60px; height: 60px;
border: 4px solid var(–border);
border-top-color: var(–accent);
border-radius: 50%;
animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text {
margin-top: 16px;
font-family: var(–font-display);
color: var(–text2);
font-size: 0.9rem;
letter-spacing: 1px;
}

/* Toast */
.toast {
position: fixed;
bottom: 24px;
left: 50%;
transform: translateX(-50%) translateY(80px);
background: var(–surface);
color: var(–text);
padding: 12px 24px;
border-radius: var(–radius);
border: 1px solid var(–border);
font-size: 0.85rem;
z-index: 500;
transition: transform 0.3s ease;
pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
.panel-left { width: 260px; min-width: 220px; }
.dex-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
}
@media (max-width: 600px) {
header { padding: 8px 12px; gap: 8px; flex-wrap: wrap; }
header h1 { font-size: 1.1rem; }
.header-controls { gap: 6px; }
.btn { padding: 6px 10px; font-size: 0.7rem; }
.main-wrap { flex-direction: column; }
.panel-left {
width: 100%;
max-height: 45vh;
border-right: none;
border-bottom: 1px solid var(–border);
}
.dex-grid { grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 6px; }
.type-bar { padding: 8px 12px; gap: 4px; }
.type-chip { font-size: 0.6rem; padding: 3px 7px; }
.dex-grid-wrap { padding: 12px; }
}
@media (max-width: 380px) {
.dex-grid { grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); }
header h1 { font-size: 0.95rem; }
}

/* Landscape mobile */
@media (max-height: 500px) and (orientation: landscape) {
.main-wrap { flex-direction: row; }
.panel-left {
width: 240px;
max-height: none;
border-right: 1px solid var(–border);
border-bottom: none;
}
header { padding: 6px 16px; }
header h1 { font-size: 1rem; }
.type-bar { padding: 6px 12px; }
.status-bar { padding: 4px 12px; }
}

/* Touch: always show remove buttons */
@media (hover: none) {
.dex-slot.filled .remove-btn { opacity: 1; }
}
</style>

</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="pokeball-spinner"></div>
  <div class="loading-text">Loading Pokémon data…</div>
</div>

<header>
  <h1>Pokédex Forge</h1>
  <div class="header-controls">
    <label>
      Dex Size
      <input type="number" id="dexSizeInput" value="151" min="1" max="1025">
    </label>
    <button class="btn btn-primary" id="exportBtn" title="Copy dex list to clipboard">Export</button>
    <button class="btn btn-danger" id="clearBtn">Clear</button>
  </div>
</header>

<div class="main-wrap">
  <!-- LEFT: Pokemon Selector -->
  <div class="panel-left">
    <div class="search-area">
      <input type="text" id="searchInput" placeholder="Search Pokémon by name or #…">
    </div>
    <div class="pokemon-list" id="pokemonList"></div>
  </div>

  <!-- RIGHT: Dex Grid & Types -->

  <div class="panel-right">
    <div class="type-bar" id="typeBar"></div>
    <div class="status-bar">
      <span class="slot-counter">
        <span class="filled" id="filledCount">0</span>
        <span class="total">/ <span id="totalSlots">151</span></span>
      </span>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <button class="btn btn-secondary" id="sortByIdBtn" style="font-size:0.7rem;padding:4px 10px">Sort by #</button>
    </div>
    <div class="dex-grid-wrap" id="dexGridWrap">
      <div class="dex-grid" id="dexGrid"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  // ── STATE ──
  const ALL_TYPES = [
    'normal','fire','water','electric','grass','ice',
    'fighting','poison','ground','flying','psychic','bug',
    'rock','ghost','dragon','dark','steel','fairy'
  ];

  let allPokemon = [];       // [{id, name, types, evoChainId}]
  let evoChains = {};         // chainId -> [ids...]
  let speciesChainMap = {};   // pokemonId -> chainId
  let dexSlots = [];          // ordered array of pokemon ids in dex
  let dexSize = 151;
  let spriteCache = {};       // id -> spriteUrl (only fetched when added)

  const SPRITE_URL = id => `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;

  // ── DOM REFS ──
  const $loading = document.getElementById('loadingOverlay');
  const $searchInput = document.getElementById('searchInput');
  const $pokemonList = document.getElementById('pokemonList');
  const $dexGrid = document.getElementById('dexGrid');
  const $dexGridWrap = document.getElementById('dexGridWrap');
  const $typeBar = document.getElementById('typeBar');
  const $filledCount = document.getElementById('filledCount');
  const $totalSlots = document.getElementById('totalSlots');
  const $progressFill = document.getElementById('progressFill');
  const $dexSizeInput = document.getElementById('dexSizeInput');
  const $exportBtn = document.getElementById('exportBtn');
  const $clearBtn = document.getElementById('clearBtn');
  const $sortByIdBtn = document.getElementById('sortByIdBtn');
  const $toast = document.getElementById('toast');

  // ── INIT ──
  async function init() {
    try {
      // Fetch full pokemon list with types from PokeAPI
      // We fetch all pokemon in one call (names + urls), then fetch types in batches
      const listResp = await fetch('https://pokeapi.co/api/v2/pokemon?limit=1025');
      const listData = await listResp.json();

      // Now fetch type info for each. Use the pokemon endpoint with type data.
      // To avoid 1025 individual calls, we use the type endpoints instead.
      // Each type endpoint lists all pokemon of that type.
      const typePromises = ALL_TYPES.map(t =>
        fetch(`https://pokeapi.co/api/v2/type/${t}`).then(r => r.json())
      );
      const typeResults = await Promise.all(typePromises);

      // Build type map: pokemonId -> [types]
      const typeMap = {};
      typeResults.forEach((typeData, i) => {
        const typeName = ALL_TYPES[i];
        typeData.pokemon.forEach(entry => {
          const url = entry.pokemon.url;
          const id = parseInt(url.split('/').filter(Boolean).pop());
          if (!typeMap[id]) typeMap[id] = [];
          typeMap[id].push(typeName);
        });
      });

      // Build allPokemon from list
      allPokemon = listData.results.map((p, idx) => {
        const id = idx + 1;
        return {
          id,
          name: p.name,
          types: typeMap[id] || ['normal']
        };
      }).filter(p => p.id <= 1025);

      // Fetch evolution chains (species endpoint has chain refs)
      // We batch-fetch species to get evolution_chain urls
      // To keep load time reasonable, fetch first 1025 species in one call
      const speciesResp = await fetch('https://pokeapi.co/api/v2/pokemon-species?limit=1025');
      const speciesData = await speciesResp.json();

      // Fetch each species detail to get evo chain URL
      // This is many calls... let's do it in batches of 50
      const chainUrls = new Map(); // chainUrl -> chainId
      const speciesDetails = [];

      // Actually, let's fetch species individually but cache chain URLs
      // Use a smarter approach: fetch species in batches
      const BATCH = 80;
      for (let i = 0; i < speciesData.results.length; i += BATCH) {
        const batch = speciesData.results.slice(i, i + BATCH);
        const details = await Promise.all(
          batch.map(s => fetch(s.url).then(r => r.json()).catch(() => null))
        );
        details.forEach(d => { if (d) speciesDetails.push(d); });
      }

      // Gather unique chain URLs
      const uniqueChainUrls = new Set();
      speciesDetails.forEach(s => {
        if (s.evolution_chain?.url) {
          uniqueChainUrls.add(s.evolution_chain.url);
          const chainId = s.evolution_chain.url.split('/').filter(Boolean).pop();
          speciesChainMap[s.id] = chainId;
        }
      });

      // Fetch all evolution chains
      const chainUrlArray = [...uniqueChainUrls];
      for (let i = 0; i < chainUrlArray.length; i += BATCH) {
        const batch = chainUrlArray.slice(i, i + BATCH);
        const chains = await Promise.all(
          batch.map(url => fetch(url).then(r => r.json()).catch(() => null))
        );
        chains.forEach(c => {
          if (!c) return;
          const chainId = c.id;
          const ids = [];
          function walk(node) {
            const sid = parseInt(node.species.url.split('/').filter(Boolean).pop());
            ids.push(sid);
            node.evolves_to.forEach(walk);
          }
          walk(c.chain);
          evoChains[chainId] = ids;
        });
      }

      // Done loading
      $loading.classList.add('hidden');
      setTimeout(() => $loading.style.display = 'none', 500);

      renderPokemonList();
      renderTypeBar();
      renderDexGrid();
      updateStatus();
    } catch (err) {
      console.error('Init error:', err);
      $loading.querySelector('.loading-text').textContent =
        'Failed to load data. Please refresh.';
    }
  }

  // ── POKEMON LIST (left panel) ──
  function renderPokemonList(filter = '') {
    const filt = filter.toLowerCase().trim();
    const fragment = document.createDocumentFragment();

    const filtered = allPokemon.filter(p => {
      if (!filt) return true;
      if (p.name.includes(filt)) return true;
      if (String(p.id) === filt || String(p.id).startsWith(filt)) return true;
      return false;
    });

    filtered.forEach(p => {
      const div = document.createElement('div');
      div.className = 'poke-option' + (dexSlots.includes(p.id) ? ' in-dex' : '');
      div.dataset.id = p.id;

      const typeDots = p.types.map(t =>
        `<span class="type-dot" style="background:var(--type-${t})" title="${t}"></span>`
      ).join('');

      div.innerHTML = `
        <span class="poke-id">#${String(p.id).padStart(3,'0')}</span>
        <span class="poke-name">${p.name}</span>
        <span class="poke-types">${typeDots}</span>
        <span class="poke-add-icon">+</span>
      `;
      div.addEventListener('click', () => addPokemonWithEvos(p.id));
      fragment.appendChild(div);
    });

    $pokemonList.innerHTML = '';
    $pokemonList.appendChild(fragment);
  }

  // ── ADD POKEMON + EVOLUTIONS ──
  function addPokemonWithEvos(id) {
    const chainId = speciesChainMap[id];
    let toAdd = [id];

    if (chainId && evoChains[chainId]) {
      toAdd = evoChains[chainId].filter(eid => eid <= 1025);
    }

    // Filter out already added
    toAdd = toAdd.filter(eid => !dexSlots.includes(eid));

    // Check capacity
    const slotsLeft = dexSize - dexSlots.length;
    if (slotsLeft <= 0) {
      showToast('Dex is full!');
      return;
    }
    if (toAdd.length === 0) {
      showToast('Already in your Dex');
      return;
    }

    toAdd = toAdd.slice(0, slotsLeft);
    dexSlots.push(...toAdd);

    // Pre-load sprites for added mons only
    toAdd.forEach(eid => { spriteCache[eid] = SPRITE_URL(eid); });

    const mon = allPokemon.find(p => p.id === id);
    if (toAdd.length > 1) {
      showToast(`Added ${toAdd.length} Pokémon (${mon?.name} line)`);
    } else {
      showToast(`Added ${mon?.name}`);
    }

    renderDexGrid();
    renderPokemonList($searchInput.value);
    updateStatus();
    renderTypeBar();
  }

  function removePokemon(id) {
    dexSlots = dexSlots.filter(s => s !== id);
    delete spriteCache[id];
    renderDexGrid();
    renderPokemonList($searchInput.value);
    updateStatus();
    renderTypeBar();
  }

  // ── DEX GRID ──
  function renderDexGrid() {
    $dexGrid.innerHTML = '';
    const total = dexSize;

    for (let i = 0; i < total; i++) {
      const slot = document.createElement('div');
      slot.className = 'dex-slot';
      slot.dataset.index = i;

      if (i < dexSlots.length) {
        const pid = dexSlots[i];
        const mon = allPokemon.find(p => p.id === pid);
        slot.classList.add('filled');
        slot.draggable = true;
        slot.dataset.pokeid = pid;

        slot.innerHTML = `
          <span class="slot-id">#${String(pid).padStart(3,'0')}</span>
          <img src="${spriteCache[pid] || SPRITE_URL(pid)}" alt="${mon?.name}" loading="lazy">
          <span class="slot-label">${mon?.name || ''}</span>
          <span class="remove-btn" title="Remove">×</span>
        `;

        // Remove button
        slot.querySelector('.remove-btn').addEventListener('click', e => {
          e.stopPropagation();
          removePokemon(pid);
        });

        // Drag events
        slot.addEventListener('dragstart', onDragStart);
        slot.addEventListener('dragend', onDragEnd);
      } else {
        slot.classList.add('empty');
        slot.innerHTML = `<span class="slot-num">${i + 1}</span>`;
      }

      // Drop target
      slot.addEventListener('dragover', onDragOver);
      slot.addEventListener('dragenter', onDragEnter);
      slot.addEventListener('dragleave', onDragLeave);
      slot.addEventListener('drop', onDrop);

      $dexGrid.appendChild(slot);
    }
  }

  // ── DRAG & DROP ──
  let dragSrcIndex = null;

  function onDragStart(e) {
    dragSrcIndex = parseInt(this.dataset.index);
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', dragSrcIndex);
  }
  function onDragEnd() {
    this.classList.remove('dragging');
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  }
  function onDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
  }
  function onDragEnter(e) {
    e.preventDefault();
    this.classList.add('drag-over');
  }
  function onDragLeave() {
    this.classList.remove('drag-over');
  }
  function onDrop(e) {
    e.preventDefault();
    this.classList.remove('drag-over');
    const targetIndex = parseInt(this.dataset.index);
    if (dragSrcIndex === null || dragSrcIndex === targetIndex) return;
    if (dragSrcIndex >= dexSlots.length) return;

    // Reorder: remove from src, insert at target
    const [moved] = dexSlots.splice(dragSrcIndex, 1);
    const insertAt = Math.min(targetIndex, dexSlots.length);
    dexSlots.splice(insertAt, 0, moved);

    renderDexGrid();
    dragSrcIndex = null;
  }

  // ── Touch drag support ──
  let touchDragIndex = null;
  let touchClone = null;
  let touchStartY = 0;
  let touchStartX = 0;
  let touchMoved = false;

  $dexGrid.addEventListener('touchstart', e => {
    const slot = e.target.closest('.dex-slot.filled');
    if (!slot || e.target.closest('.remove-btn')) return;
    touchDragIndex = parseInt(slot.dataset.index);
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchMoved = false;
  }, { passive: true });

  $dexGrid.addEventListener('touchmove', e => {
    if (touchDragIndex === null) return;
    const dx = e.touches[0].clientX - touchStartX;
    const dy = e.touches[0].clientY - touchStartY;
    if (!touchMoved && Math.abs(dx) + Math.abs(dy) > 15) {
      touchMoved = true;
    }
    if (!touchMoved) return;
    e.preventDefault();

    if (!touchClone) {
      const src = $dexGrid.children[touchDragIndex];
      touchClone = src.cloneNode(true);
      touchClone.style.position = 'fixed';
      touchClone.style.zIndex = 999;
      touchClone.style.opacity = 0.8;
      touchClone.style.pointerEvents = 'none';
      touchClone.style.width = src.offsetWidth + 'px';
      touchClone.style.height = src.offsetHeight + 'px';
      document.body.appendChild(touchClone);
      src.classList.add('dragging');
    }
    touchClone.style.left = (e.touches[0].clientX - 40) + 'px';
    touchClone.style.top = (e.touches[0].clientY - 40) + 'px';

    // Highlight target
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
    const target = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
    const targetSlot = target?.closest?.('.dex-slot');
    if (targetSlot) targetSlot.classList.add('drag-over');
  }, { passive: false });

  $dexGrid.addEventListener('touchend', e => {
    if (touchDragIndex === null) return;
    if (touchClone) {
      document.body.removeChild(touchClone);
      touchClone = null;
    }
    document.querySelectorAll('.dragging').forEach(el => el.classList.remove('dragging'));
    document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));

    if (touchMoved) {
      const touch = e.changedTouches[0];
      const target = document.elementFromPoint(touch.clientX, touch.clientY);
      const targetSlot = target?.closest?.('.dex-slot');
      if (targetSlot) {
        const targetIndex = parseInt(targetSlot.dataset.index);
        if (touchDragIndex !== targetIndex && touchDragIndex < dexSlots.length) {
          const [moved] = dexSlots.splice(touchDragIndex, 1);
          const insertAt = Math.min(targetIndex, dexSlots.length);
          dexSlots.splice(insertAt, 0, moved);
          renderDexGrid();
        }
      }
    }
    touchDragIndex = null;
    touchMoved = false;
  });

  // ── TYPE BAR ──
  function renderTypeBar() {
    const counts = {};
    ALL_TYPES.forEach(t => counts[t] = 0);
    dexSlots.forEach(id => {
      const mon = allPokemon.find(p => p.id === id);
      if (mon) mon.types.forEach(t => { if (counts[t] !== undefined) counts[t]++; });
    });

    $typeBar.innerHTML = ALL_TYPES.map(t => `
      <span class="type-chip${counts[t] > 0 ? ' active' : ''}" style="${counts[t] > 0 ? `color:var(--type-${t});border-color:var(--type-${t})` : ''}">
        <span class="type-dot" style="background:var(--type-${t})"></span>
        ${t}
        <span class="type-count">${counts[t]}</span>
      </span>
    `).join('');
  }

  // ── STATUS ──
  function updateStatus() {
    const filled = dexSlots.length;
    $filledCount.textContent = filled;
    $totalSlots.textContent = dexSize;
    $progressFill.style.width = `${Math.min(100, (filled / dexSize) * 100)}%`;
  }

  // ── EXPORT ──
  $exportBtn.addEventListener('click', () => {
    if (dexSlots.length === 0) {
      showToast('Dex is empty');
      return;
    }
    const lines = dexSlots.map((id, i) => {
      const mon = allPokemon.find(p => p.id === id);
      return `${String(i + 1).padStart(3, '0')}. ${mon?.name ? mon.name.charAt(0).toUpperCase() + mon.name.slice(1) : '???'} (#${id})`;
    });
    const text = `Pokédex (${dexSlots.length}/${dexSize})\n${'─'.repeat(30)}\n${lines.join('\n')}`;
    navigator.clipboard.writeText(text).then(() => {
      showToast('Copied to clipboard!');
    }).catch(() => {
      showToast('Copy failed – check permissions');
    });
  });

  // ── CLEAR ──
  $clearBtn.addEventListener('click', () => {
    if (dexSlots.length === 0) return;
    if (!confirm('Clear all Pokémon from your Dex?')) return;
    dexSlots = [];
    spriteCache = {};
    renderDexGrid();
    renderPokemonList($searchInput.value);
    updateStatus();
    renderTypeBar();
    showToast('Dex cleared');
  });

  // ── SORT ──
  $sortByIdBtn.addEventListener('click', () => {
    if (dexSlots.length === 0) return;
    dexSlots.sort((a, b) => a - b);
    renderDexGrid();
    showToast('Sorted by Pokédex number');
  });

  // ── DEX SIZE ──
  $dexSizeInput.addEventListener('change', () => {
    let val = parseInt($dexSizeInput.value);
    if (isNaN(val) || val < 1) val = 1;
    if (val > 1025) val = 1025;
    $dexSizeInput.value = val;
    dexSize = val;

    // Trim slots if necessary
    if (dexSlots.length > dexSize) {
      const removed = dexSlots.splice(dexSize);
      removed.forEach(id => delete spriteCache[id]);
      renderPokemonList($searchInput.value);
    }

    renderDexGrid();
    updateStatus();
    renderTypeBar();
  });

  // ── SEARCH ──
  let searchDebounce;
  $searchInput.addEventListener('input', () => {
    clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => {
      renderPokemonList($searchInput.value);
    }, 150);
  });

  // ── TOAST ──
  function showToast(msg) {
    $toast.textContent = msg;
    $toast.classList.add('show');
    setTimeout(() => $toast.classList.remove('show'), 2000);
  }

  // GO
  init();
})();
</script>

</body>
</html>
